<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Traffic Video</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:450px;
    background:white;
    border-radius:15px;
    padding:35px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

h1{
    color:#1e3a8a;
    margin-bottom:15px;
}

p{
    color:#555;
    margin-bottom:25px;
}

input[type=file]{
    width:100%;
    padding:12px;
    border:2px dashed #1e3a8a;
    border-radius:10px;
    margin-bottom:25px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    background:#2563eb;
    color:white;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.back{
    display:inline-block;
    margin-top:20px;
    text-decoration:none;
    color:#2563eb;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

<h1>Upload Traffic Video</h1>

<p>Select a traffic video for AI analysis.</p>

<form action="/analyze" method="POST" enctype="multipart/form-data">

<input
type="file"
name="video"
accept=".mp4,.avi,.mov"
required>

<button type="submit">
Analyze Traffic
</button>

</form>

<a href="/" class="back">⬅ Back to Home</a>

</div>

</body>
</html>
